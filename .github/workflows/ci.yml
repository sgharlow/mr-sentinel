name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run pytest
        run: pytest -v

      - name: Validate rubric YAML against JSONSchema
        run: |
          python -c "
          import json, yaml, jsonschema
          schema = json.load(open('rubric/schema.json'))
          rubric = yaml.safe_load(open('rubric/v1.yaml'))
          jsonschema.validate(rubric, schema)
          print('rubric schema validation OK')
          "
