<!doctype html>
<!--
  Shot D capture asset — renders the REAL Cloud Run trace of one MR Sentinel
  evaluation (captured live 2026-06-10, rev mr-sentinel-webhook-00017-d54, MR !9).
  Lines are verbatim app log output. Open full-screen, dark; it self-reveals on
  load (~11s) then holds. Record it (OBS or the capture harness) for Shot D.
  Refresh (or press R) to replay the reveal.
-->
<html lang="en">
<head>
<meta charset="utf-8">
<title>MR Sentinel — agent loop (GitLab MCP)</title>
<style>
  :root { --bg:#0b0f14; --fg:#cdd6e3; --dim:#5b6877; --mcp:#39d0d8; --gem:#c792ea;
          --ok:#7ee787; --block:#ff6b6b; --amber:#ffcb6b; }
  * { box-sizing:border-box; }
  html,body { margin:0; height:100%; background:var(--bg); }
  body { display:flex; align-items:center; justify-content:center;
         font:18px/1.7 ui-monospace,"Cascadia Code","JetBrains Mono",Consolas,monospace; color:var(--fg); }
  .term { width:1180px; max-width:94vw; background:#0d1219; border:1px solid #1c2733;
          border-radius:12px; box-shadow:0 24px 80px rgba(0,0,0,.55); overflow:hidden; }
  .bar { display:flex; align-items:center; gap:8px; padding:12px 16px; background:#11171f;
         border-bottom:1px solid #1c2733; color:var(--dim); font-size:14px; }
  .dot { width:12px; height:12px; border-radius:50%; }
  .r{background:#ff5f56}.y{background:#ffbd2e}.g{background:#27c93f}
  .bar .who { margin-left:10px; color:#8aa0b6; }
  .bar .rev { margin-left:auto; }
  .body { padding:22px 26px 30px; min-height:430px; }
  .head { color:var(--dim); margin-bottom:14px; font-size:15px; }
  .head b { color:var(--amber); }
  .ln { opacity:0; transform:translateY(4px); transition:opacity .25s, transform .25s;
        white-space:pre-wrap; padding:2px 0; }
  .ln.show { opacity:1; transform:none; }
  .ts { color:var(--dim); }
  .lvl { color:var(--dim); }
  .src { color:#8aa0b6; }
  .mcp { color:var(--mcp); font-weight:600; }
  .gem { color:var(--gem); }
  .verdict { color:var(--block); font-weight:700; }
  .pill { display:inline-block; padding:1px 8px; border-radius:6px; font-size:13px;
          background:rgba(57,208,216,.12); color:var(--mcp); border:1px solid rgba(57,208,216,.35); }
  .cursor { display:inline-block; width:9px; height:18px; background:var(--fg);
            margin-left:2px; vertical-align:-3px; animation:blink 1s steps(2) infinite; }
  @keyframes blink { 50% { opacity:0; } }
  .foot { color:var(--dim); font-size:13px; margin-top:18px; }
  .foot b { color:var(--ok); }
</style>
</head>
<body>
  <div class="term">
    <div class="bar">
      <span class="dot r"></span><span class="dot y"></span><span class="dot g"></span>
      <span class="who">Cloud Run logs · mr-sentinel-webhook</span>
      <span class="rev">rev 00017-d54</span>
    </div>
    <div class="body">
      <div class="head">▶ GitLab MR opened — <b>the agent loop runs</b> (Gemini on Vertex AI + GitLab MCP server)</div>
      <div id="log"></div>
      <div class="foot" id="foot" style="opacity:0">All three GitLab <b>MCP</b> read tools called at runtime, then Gemini's verdict via <b>record_verdict</b>. ~28s end to end · logged + replayable.</div>
    </div>
  </div>

<script>
// Verbatim from the live capture (2026-06-10, MR !9). [html] = how to colour it.
const LINES = [
  {t:"07:03:46", l:"INFO", s:"mr_sentinel.adk", h:'ADK evaluate <span class="src">sgharlow/governance-demo-app!9</span> <span class="mcp">via GitLab MCP</span>'},
  {t:"07:03:48", l:"WARN", s:"mcp-gitlab",      h:'<span class="mcp">Starting GitLab MCP Server with stdio transport</span>'},
  {t:"07:03:52", l:"INFO", s:"mr_sentinel.adk", h:'agent tool-call <span class="pill">GitLab MCP</span> &rarr; <span class="mcp">get_merge_request</span>'},
  {t:"07:03:52", l:"INFO", s:"mr_sentinel.adk", h:'agent tool-call <span class="pill">GitLab MCP</span> &rarr; <span class="mcp">get_merge_request_diffs</span>'},
  {t:"07:03:52", l:"INFO", s:"mr_sentinel.adk", h:'agent tool-call <span class="pill">GitLab MCP</span> &rarr; <span class="mcp">list_merge_request_pipelines</span>'},
  {t:"07:04:13", l:"INFO", s:"mr_sentinel.adk", h:'agent tool-call &rarr; <span class="gem">record_verdict</span>  <span style="color:#5b6877">(Gemini, on Vertex AI)</span>'},
  {t:"07:04:14", l:"INFO", s:"mr_sentinel",     h:'<span class="verdict">evaluation: score=2.0 verdict=block rules=15 mr_iid=9</span>'},
];
const delays = [350, 900, 700, 250, 250, 2600, 900]; // pacing between lines (ms)
const log = document.getElementById('log');
const foot = document.getElementById('foot');
function row(x){ return `<span class="ts">${x.t}</span>  <span class="lvl">${x.l}</span>  <span class="src">${x.s}</span>  ${x.h}`; }
function play(){
  log.innerHTML=''; foot.style.opacity=0;
  let i=0, acc=300;
  LINES.forEach((x,idx)=>{
    acc += delays[idx];
    setTimeout(()=>{
      const d=document.createElement('div'); d.className='ln'; d.innerHTML=row(x);
      log.appendChild(d); requestAnimationFrame(()=>d.classList.add('show'));
      if(idx===LINES.length-1){ const c=document.createElement('span'); c.className='cursor'; d.appendChild(c);
        setTimeout(()=>foot.style.opacity=1, 500); }
    }, acc);
  });
}
play();
addEventListener('keydown', e=>{ if(e.key.toLowerCase()==='r') play(); });
</script>
</body>
</html>
