<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" font-family="'Segoe UI','Inter','Helvetica Neue',Arial,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#131c28"/>
      <stop offset="100%" stop-color="#090d13"/>
    </linearGradient>
    <radialGradient id="oglow" cx="50%" cy="44%" r="60%">
      <stop offset="0%" stop-color="#ef4444" stop-opacity="0.45"/>
      <stop offset="70%" stop-color="#ef4444" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#ef4444" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="oct" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f5564a"/>
      <stop offset="100%" stop-color="#dc2f2f"/>
    </linearGradient>
  </defs>

  <!-- rounded-square tile -->
  <rect x="0" y="0" width="256" height="256" rx="56" fill="url(#bg)"/>
  <!-- teal accent ring -->
  <rect x="6" y="6" width="244" height="244" rx="50" fill="none" stroke="#2dd4bf" stroke-width="3" stroke-opacity="0.85"/>

  <!-- red glow behind octagon -->
  <circle cx="128" cy="124" r="92" fill="url(#oglow)"/>

  <!-- stop octagon -->
  <polygon points="207.5,160.9 160.9,207.5 95.1,207.5 48.5,160.9 48.5,95.1 95.1,48.5 160.9,48.5 207.5,95.1"
           fill="url(#oct)" stroke="#ffffff" stroke-opacity="0.12" stroke-width="2"/>

  <!-- MR monogram -->
  <text x="128" y="156" text-anchor="middle" font-size="86" font-weight="800" letter-spacing="-3" fill="#ffffff">MR</text>
</svg>
