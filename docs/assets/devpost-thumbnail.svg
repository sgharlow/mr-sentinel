<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" font-family="'Segoe UI','Inter','Helvetica Neue',Arial,sans-serif">
  <defs>
    <radialGradient id="glow" cx="50%" cy="46%" r="55%">
      <stop offset="0%" stop-color="#0f5c54" stop-opacity="0.55"/>
      <stop offset="55%" stop-color="#0a2e2b" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#0a0e14" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#151d29"/>
      <stop offset="100%" stop-color="#0f1620"/>
    </linearGradient>
    <filter id="cardshadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="16" stdDeviation="28" flood-color="#ef4444" flood-opacity="0.22"/>
    </filter>
  </defs>

  <!-- background -->
  <rect width="1280" height="720" fill="#0a0e14"/>
  <rect width="1280" height="720" fill="url(#glow)"/>
  <!-- top hairline accent -->
  <rect x="0" y="0" width="1280" height="5" fill="#2dd4bf"/>

  <!-- wordmark -->
  <text x="64" y="96" font-size="54" font-weight="800" letter-spacing="3" fill="#f8fafc">MR SENTINEL</text>
  <rect x="66" y="112" width="252" height="6" rx="3" fill="#2dd4bf"/>

  <!-- built on google cloud (top-right) -->
  <g transform="translate(1216,86)">
    <text text-anchor="end" font-size="24" font-weight="600" fill="#94a3b8">Built on Google Cloud</text>
  </g>
  <g transform="translate(912,73)">
    <rect x="0" y="0" width="11" height="11" rx="2" fill="#4285F4"/>
    <rect x="14" y="0" width="11" height="11" rx="2" fill="#EA4335"/>
    <rect x="0" y="14" width="11" height="11" rx="2" fill="#FBBC05"/>
    <rect x="14" y="14" width="11" height="11" rx="2" fill="#34A853"/>
  </g>

  <!-- verdict card -->
  <rect x="360" y="206" width="560" height="306" rx="22" fill="url(#card)" stroke="#ef4444" stroke-width="2" filter="url(#cardshadow)"/>
  <rect x="360" y="206" width="8" height="306" rx="4" fill="#ef4444"/>

  <!-- stop octagon icon -->
  <g>
    <polygon points="508.8,316.1 486.1,338.8 453.9,338.8 431.2,316.1 431.2,283.9 453.9,261.2 486.1,261.2 508.8,283.9"
             fill="#ef4444"/>
    <rect x="445" y="295" width="50" height="11" rx="3" fill="#ffffff"/>
  </g>
  <!-- verdict word -->
  <text x="540" y="322" font-size="66" font-weight="800" letter-spacing="2" fill="#f05252">BLOCK</text>

  <!-- score -->
  <text x="402" y="392" font-size="27" font-weight="500" fill="#94a3b8">score <tspan fill="#f8fafc" font-weight="700">0.0</tspan> / 10</text>

  <!-- failing rule pill -->
  <rect x="402" y="414" width="256" height="42" rx="21" fill="#16202c" stroke="#2dd4bf" stroke-width="1.5"/>
  <circle cx="426" cy="435" r="5" fill="#2dd4bf"/>
  <text x="442" y="442" font-size="22" font-weight="600" fill="#2dd4bf">no-secrets-in-diff</text>

  <!-- control mappings -->
  <text x="402" y="490" font-size="20" font-weight="500" fill="#64748b">SOC 2 CC6.1  &#183;  ISO 27001 A.9.4.3  &#183;  OWASP-ASVS V2</text>

  <!-- tagline -->
  <text x="64" y="628" font-size="35" font-weight="600" fill="#f1f5f9">AI compliance governance for merge requests</text>
  <text x="64" y="670" font-size="24" font-weight="600" fill="#2dd4bf">Gemini 2.5 Flash  &#183;  GitLab  &#183;  reviewed in ~30 seconds</text>
</svg>
